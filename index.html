<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1642">
    <title>イラストロジック - 修正完了版</title>
    <style>
        /* UIパネルのスタイル */
        #custom-ui {
            text-align: center;
            padding: 10px;
            background: #f0f0f0;
            border-bottom: 2px solid #ccc;
            position: sticky;
            top: 0;
            z-index: 9999;
        }
        #custom-ui button {
            padding: 12px 20px;
            font-size: 18px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #999;
            background: #fff;
        }
        #custom-ui button.active {
            background: #00CFFF;
            color: white;
            font-weight: bold;
            border-color: #008eb6;
        }
        .spacer { margin: 0 15px; border-left: 1px solid #ccc; }
    </style>
</head>
<body>

<div id="custom-ui">
    <button id="m1" class="active" onclick="changeMode(1)">■ 塗る</button>
    <button id="m2" onclick="changeMode(2)">× バツ</button>
    <button id="m0" onclick="changeMode(0)">□ 消す</button>
    <span class="spacer"></span>
    <button onclick="execUndo()">← 戻る</button>
    <button onclick="execRedo()">進む →</button>
</div>

<div style="white-space: nowrap;width:100%; text-align:center; user-select:none;">
    <h1>計算してみると......</h1>
    <canvas id="pz_Q4v30a" width="1632" height="1812"></canvas>
    <div style="position:relative; line-height:1em; margin-top:-2em;"><small>Powered by お絵かきロジック工房Mobile</small></div>
</div>

<script type="text/javascript">
    // --- グローバル管理変数 ---
    var undoStack = [];
    var redoStack = [];
    var currentInputMode = 1;

    // モード切替
    function changeMode(m) {
        currentInputMode = m;
        document.querySelectorAll('#custom-ui button').forEach(b => b.classList.remove('active'));
        document.getElementById('m' + m).classList.add('active');
    }

    // 履歴保存（盤面配列をコピー）
    function pushHistory(currentMap, fmx) {
        var copy = [];
        for(var i=0; i<fmx; i++) copy[i] = currentMap[i].slice();
        undoStack.push(copy);
        if(undoStack.length > 50) undoStack.shift();
        redoStack = [];
    }

    // --- メインロジック ---
    function mf_7ro5sw(){
        var pcs = document.getElementById('pz_Q4v30a');
        var pcx = pcs.getContext('2d');
        var of = document.createElement('canvas');
        of.width = pcs.width; of.height = pcs.height;
        var ofc = of.getContext('2d');
        
        // 元の変数群
        var pm=1; var ct=0; var pf=0; var cpx=0; var cpy=0; var cv=true; var sp=0; var pp=0; var ds=24;
        var fmx=50; var fmy=30; var fx=360; var fy=216;
        var c1="#FFFFFF", c2="#FFFFFF", cw="#FFFFFF", cfb="rgba(255,255,255,0.50)", cCr="rgba(255,255,255,0.70)", cl="#AAAAAA", cm="#CC2222", cf="#000000", cc="rgba(0,207,255,0.20)", ccC="#00CFFF", cs="#444444", cb1="#FFFFFF", cb2="#CCCCCC";
        var ps=326; var pdx=ps+24; var pdy=fy+fmy*ds+204+ps; var bs=272; var pbx=pcs.width-bs-24; var pby=fy+fmy*ds+204+ps;
        
        var ln=[[0],[2,2,2,1],[1,1,1,2],[1,1,1,4],[2,2,2,1],[0],[3,2,2,2,2,2],[5,4,4,3,3,3],[1,2,1,2,1,2,4,3,3],[2,2,2,1,2,1,2,1,2],[2,2,2,2,2,1,2,1,2],[2,4,1,1,4,1,2,4,1,2,1,2],[2,2,2,2,2,1,2,1,2],[2,2,2,7,12],[5,4,4,2,2,2],[5,4,4,2,2,2],[0],[50],[0],[3,2,2,2,2,2],[5,4,4,3,3,3],[1,2,1,2,1,2,4,3,3],[2,2,2,1,1,2,1,2,1,2],[2,2,2,2,1,2,2,2,1,2,1,2],[2,2,1,1,5,1,2,2,1,2,1,2],[2,2,2,1,2,2,1,2,1,2],[2,2,2,1,7,12],[5,4,4,2,2,2],[5,4,4,2,2,2],[0]];
        var tn=[[2,3,1,2,3],[2,4,1,2,4],[2,2,2,1,2,2,2],[6,2,1,6,2],[1,2,4,2,1,4,2],[2,1,1],[1,1],[1,2,1,1,2],[2,1,1,1,2],[1,1],[1],[2,3,1,2,3],[2,4,1,2,4],[7,2,1,7,2],[4,2,1,4,2],[1],[2,3,1,2,3],[2,4,1,2,4],[7,2,1,7,2],[1,2,4,2,1,4,2],[2,1,1,1],[1,1,1],[1,1,5],[1,1,1],[1,1,1],[1],[2,1,2],[4,1,4],[3,1,1,3,1],[2,1,1,2,1],[10,1,10],[10,1,10],[1,1,1],[1,1],[1,1,2],[1,1,2],[1,1],[1],[3,1,3],[2,1,1,2,1],[2,1,1,2,1],[10,1,10],[10,1,10],[1,1,1],[3,1,3],[2,1,1,2,1],[1,2,1,1,2,1],[2,10,1,10],[4,10,1,10],[1,1,1,1]];
        var lnm=12; var tnm=7;
        var manual=["スマホ用コントローラーを使う場合はここをタップしてください"];

        var ppY=new Array(fmx); var ppX=new Array(fmy);
        var map = new Array(fmx);
        for(var i=0;i<fmx;i++){ map[i]=new Array(fmy); for(var j=0;j<fmy;j++) map[i][j]=0; }

        // 背景・グリッド・数字の初期描画
        function drawAllBase() {
            ofc.fillStyle=c1; ofc.fillRect(0, 0, of.width, of.height);
            ofc.font = ""+parseInt(ds*5/7)+"px Arial"; ofc.textAlign = "center";
            ofc.fillStyle=cw; ofc.fillRect(fx, fy, ds*fmx, ds*fmy);
            ofc.fillStyle=cl;
            for(var i=1;i<fmx;i++) if(i%5!=0) ofc.fillRect(fx+i*ds, fy, 1, ds*fmy);
            for(var i=1;i<fmy;i++) if(i%5!=0) ofc.fillRect(fx, fy+i*ds, ds*fmx, 1);
            ofc.fillStyle=cm;
            for(var i=5;i<fmx;i+=5) ofc.fillRect(fx+i*ds, fy, 1, ds*fmy);
            for(var i=5;i<fmy;i+=5) ofc.fillRect(fx, fy+i*ds, ds*fmx, 1);
            ofc.fillStyle = cfb;
            for(var i=0;i<fmx;i++) for(var j=1;j<=tnm;j++) ofc.fillRect(fx+i*ds+1,fy-j*ds+1,ds-1,ds-1);
            for(var i=0;i<fmy;i++) for(var j=1;j<=lnm;j++) ofc.fillRect(fx-j*ds+1,fy+i*ds+1,ds-1,ds-1);
            ofc.fillStyle = cf;
            ofc.strokeRect(fx,fy,ds*fmx,ds*fmy);
            for(var i=0;i<fmx;i++) for(var j=0;j<tn[i].length;j++) ofc.fillText(tn[i][j],fx+i*ds+ds/2,fy-(tn[i].length-j-1)*ds-ds/6,ds);
            for(var i=0;i<fmy;i++) for(var j=0;j<ln[i].length;j++) ofc.fillText(ln[i][j],fx-(ln[i].length-j)*ds+ds/2,fy+(i+1)*ds-ds/6,ds);
            if(sp>=2) tud();
            updateField();
        }

        function drawSingleCell(x, y) {
            var val = map[x][y];
            if(val==1) { ofc.fillStyle=cf; ofc.fillRect(fx+x*ds+1, fy+y*ds+1, ds-1, ds-1); }
            else if(val==0) { ofc.fillStyle=cw; ofc.fillRect(fx+x*ds+1, fy+y*ds+1, ds-1, ds-1); }
            else if(val==2) {
                ofc.fillStyle=cw; ofc.fillRect(fx+x*ds+1, fy+y*ds+1, ds-1, ds-1);
                ofc.beginPath(); ofc.lineWidth=0.5; ofc.strokeStyle=cf;
                ofc.moveTo(fx+x*ds+3, fy+y*ds+3); ofc.lineTo(fx+x*ds+ds-2, fy+y*ds+ds-2);
                ofc.moveTo(fx+x*ds+ds-2, fy+y*ds+3); ofc.lineTo(fx+x*ds+3, fy+y*ds+ds-2);
                ofc.stroke();
            }
        }

        // 外部Undo/Redo命令
        window.execUndo = function() {
            if(undoStack.length > 0) {
                var redoCopy = []; for(var i=0; i<fmx; i++) redoCopy[i] = map[i].slice();
                redoStack.push(redoCopy);
                map = undoStack.pop();
                refreshCanvas();
            }
        };
        window.execRedo = function() {
            if(redoStack.length > 0) {
                var undoCopy = []; for(var i=0; i<fmx; i++) undoCopy[i] = map[i].slice();
                undoStack.push(undoCopy);
                map = redoStack.pop();
                refreshCanvas();
            }
        };
        function refreshCanvas() {
            drawAllBase();
            for(var i=0; i<fmx; i++) for(var j=0; j<fmy; j++) drawSingleCell(i, j);
            updateField();
        }

        // --- 元の補助関数群 ---
        function tud(){ /* コントローラー描画 */ ofc.fillStyle="#eee"; ofc.beginPath(); ofc.arc(pdx,pdy,ps,0,Math.PI*2); ofc.fill(); ofc.stroke(); ofc.beginPath(); ofc.arc(pbx,pby,bs,0,Math.PI*2); ofc.fill(); ofc.stroke(); }
        function updateField(){ pcx.drawImage(of,0,0); nmk(0,0,fmx-1,fmy-1); if(cv) dc(); }
        function dc(){ pcx.fillStyle=cc; pcx.fillRect(fx+cpx*ds+1,fy-tnm*ds+1,ds-1,tnm*ds-1); pcx.fillRect(fx-lnm*ds+1,fy+cpy*ds+1,lnm*ds-1,ds-1); du(2); }
        function du(waku){ if(waku){ pcx.fillStyle=ccC; pcx.fillRect(fx+cpx*ds+1,fy+cpy*ds+1,ds-1,ds-1); } }
        function _cu(){ pcx.drawImage(of, fx+cpx*ds, fy-tnm*ds, ds, (tnm+fmy)*ds, fx+cpx*ds, fy-tnm*ds, ds, (tnm+fmy)*ds); pcx.drawImage(of, fx-lnm*ds, fy+cpy*ds, (lnm+fmx)*ds, ds, fx-lnm*ds, fy+cpy*ds, (lnm+fmx)*ds, ds); nmk(cpx,cpy,cpx,cpy); du(0); }
        
        function paint(){
            if(map[cpx][cpy] == currentInputMode) return;
            map[cpx][cpy] = currentInputMode;
            drawSingleCell(cpx, cpy);
            _cu(); dc();
        }

        function point(mouseX,mouseY){ mouseX-=fx; mouseY-=fy; if (mouseX>=0 && mouseY>=0){ mouseX=parseInt(mouseX/ds); mouseY=parseInt(mouseY/ds); if (mouseX<fmx && mouseY<fmy){ if (cpx!=mouseX || cpy!=mouseY){ _cu(); cpx=mouseX; cpy=mouseY; dc(); cv=true; } return true; } } return false; }
        
        function nmk(ptX,ptY,toX,toY){
            pcx.fillStyle=cCr;
            for(var ll=ptY;ll<=toY;ll++){
                var id=0, cnt=0;
                for(var i=0;i<fmx;i++){ if(map[i][ll]==1){cnt++;} else if(cnt>0){ if(ln[ll][id]==cnt)id++; cnt=0; } }
                if(cnt>0 && ln[ll][id]==cnt)id++;
                if(id==ln[ll].length && cnt==0){ ppX[ll]=1; pcx.fillRect(fx-ds+2, fy+ll*ds+2, ds-3, ds-3); } else ppX[ll]=0;
            }
            for(var ll=ptX;ll<=toX;ll++){
                var id=0, cnt=0;
                for(var i=0;i<fmy;i++){ if(map[ll][i]==1){cnt++;} else if(cnt>0){ if(tn[ll][id]==cnt)id++; cnt=0; } }
                if(cnt>0 && tn[ll][id]==cnt)id++;
                if(id==tn[ll].length && cnt==0){ ppY[ll]=1; pcx.fillRect(fx+ll*ds+2, fy-ds+2, ds-3, ds-3); } else ppY[ll]=0;
            }
        }

        // --- イベント制御 ---
        var isPress = false;
        pcs.addEventListener("mousedown", function(e){
            isPress = true;
            var rect = e.target.getBoundingClientRect();
            if(point(e.clientX-rect.left, e.clientY-rect.top)){
                pushHistory(map, fmx);
                paint();
            }
        }, false);

        pcs.addEventListener("mousemove", function(e){
            if(!isPress) return;
            var rect = e.target.getBoundingClientRect();
            if(point(e.clientX-rect.left, e.clientY-rect.top)) paint();
        }, false);

        window.addEventListener("mouseup", function(){ isPress = false; }, false);

        // タッチイベント（簡易化して統合）
        pcs.addEventListener("touchstart", function(e){
            var rect = e.target.getBoundingClientRect();
            var t = e.touches[0];
            if(point(t.clientX-rect.left, t.clientY-rect.top)){
                pushHistory(map, fmx);
                paint();
                e.preventDefault();
            }
        }, {passive: false});

        pcs.addEventListener("touchmove", function(e){
            var rect = e.target.getBoundingClientRect();
            var t = e.touches[0];
            if(point(t.clientX-rect.left, t.clientY-rect.top)){
                paint();
                e.preventDefault();
            }
        }, {passive: false});

        // 初回描画実行
        drawAllBase();
    }

    // 起動
    window.onload = mf_7ro5sw;
</script>
</body>
</html>
