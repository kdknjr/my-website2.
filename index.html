        body { font-family: sans-serif; background: #f0f0f0; }

        .controls { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button {
            padding: 12px 24px; font-size: 16px; cursor: pointer;
            border: 2px solid #333; background: #fff; border-radius: 8px;
            transition: all 0.2s;
        }
        button:active { transform: translateY(2px); }
        button.active { background: #00CFFF; color: #fff; border-color: #008eb6; font-weight: bold; }
        button.tool { background: #e0e0e0; }
        button.danger { color: #CC2222; border-color: #CC2222; }
        canvas { background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
