<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=1642">
		<title>イラストロジック - 修正完了版</title>
		<style>
			.menu { text-align: center; padding: 10px; background: #eee; position: sticky; top: 0; z-index: 1000; }
			button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 0 5px; border: 1px solid #999; background: #fff; border-radius: 4px; }
			button.active { background: #00CFFF; color: #fff; font-weight: bold; border-color: #008eb6; }
		</style>
	</head>
	<body>
		<div class="menu">
			<button id="m1" class="active" onclick="window.setMode(1)">■ 塗る</button>
			<button id="m2" onclick="window.setMode(2)">× バツ</button>
			<button id="m0" onclick="window.setMode(0)">□ 消す</button>
			|
			<button onclick="window.doUndo()">← 戻る</button>
			<button onclick="window.doRedo()">進む →</button>
		</div>

		<div style="white-space: nowrap;width:100%; text-align:center; user-select:none;">
			<h1>計算してみると......</h1>
			<canvas id="pz_Q4v30a" width="1632" height="1812"></canvas>
			<div style="position:relative; line-height:1em; margin-top:-2em;"><small>Powered by お絵かきロジック工房Mobile</small></div>
		</div>

		<script type="text/javascript">
			// 外部から操作するための変数
			window.setMode = function(m) {
				window.currentMode = m;
				document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
				document.getElementById('m' + m).classList.add('active');
			};

			function mf_7ro5sw(){
				var pcs = document.getElementById('pz_Q4v30a');
				var pcx = pcs.getContext('2d');
				var of = document.createElement('canvas');
				of.width = pcs.width; of.height = pcs.height;
				var ofc = of.getContext('2d');
				
				// 基本変数
				var pm=1; var ct=0; var pf=0; var cpx=0; var cpy=0; var cv=true; var sp=0; var pp=0; var ds=24;
				var fmx=50; var fmy=30; var fx=360; var fy=216;
				var c1="#FFFFFF", c2="#FFFFFF", cw="#FFFFFF", cfb="rgba(255,255,255,0.50)", cCr="rgba(255,255,255,0.70)", cl="#AAAAAA", cm="#CC2222", cf="#000000", cc="rgba(0,207,255,0.20)", ccC="#00CFFF", cs="#444444", cb1="#FFFFFF", cb2="#CCCCCC";
				var ps=326; var pdx=ps+24; var pdy=fy+fmy*ds+204+ps; var bs=272; var pbx=pcs.width-bs-24; var pby=fy+fmy*ds+204+ps;
				
				var ln=[[0],[2,2,2,1],[1,1,1,2],[1,1,1,4],[2,2,2,1],[0],[3,2,2,2,2,2],[5,4,4,3,3,3],[1,2,1,2,1,2,4,3,3],[2,2,2,1,2,1,2,1,2],[2,2,2,2,2,1,2,1,2],[2,4,1,1,4,1,2,4,1,2,1,2],[2,2,2,2,2,1,2,1,2],[2,2,2,7,12],[5,4,4,2,2,2],[5,4,4,2,2,2],[0],[50],[0],[3,2,2,2,2,2],[5,4,4,3,3,3],[1,2,1,2,1,2,4,3,3],[2,2,2,1,1,2,1,2,1,2],[2,2,2,2,1,2,2,2,1,2,1,2],[2,2,1,1,5,1,2,2,1,2,1,2],[2,2,2,1,2,2,1,2,1,2],[2,2,2,1,7,12],[5,4,4,2,2,2],[5,4,4,2,2,2],[0]];
				var tn=[[2,3,1,2,3],[2,4,1,2,4],[2,2,2,1,2,2,2],[6,2,1,6,2],[1,2,4,2,1,4,2],[2,1,1],[1,1],[1,2,1,1,2],[2,1,1,1,2],[1,1],[1],[2,3,1,2,3],[2,4,1,2,4],[7,2,1,7,2],[4,2,1,4,2],[1],[2,3,1,2,3],[2,4,1,2,4],[7,2,1,7,2],[1,2,4,2,1,4,2],[2,1,1,1],[1,1,1],[1,1,5],[1,1,1],[1,1,1],[1],[2,1,2],[4,1,4],[3,1,1,3,1],[2,1,1,2,1],[10,1,10],[10,1,10],[1,1,1],[1,1],[1,1,2],[1,1,2],[1,1],[1],[3,1,3],[2,1,1,2,1],[2,1,1,2,1],[10,1,10],[10,1,10],[1,1,1],[3,1,3],[2,1,1,2,1],[1,2,1,1,2,1],[2,10,1,10],[4,10,1,10],[1,1,1,1]];
				var lnm=12; var tnm=7;
				
				var ppY=new Array(fmx); var ppX=new Array(fmy);
				var map = new Array(fmx);
				for(i=0;i<fmx;i++){ map[i]=new Array(fmy); for(j=0;j<fmy;j++) map[i][j]=0; }

				// 履歴用
				var undoStack = [];
				var redoStack = [];
				window.currentMode = 1;

				// 初期背景
				ofc.fillStyle=c1; ofc.fillRect(0, 0, of.width, of.height);
				ofc.font = ""+parseInt(ds*5/7)+"px Arial"; ofc.textAlign = "center";
				ofc.fillStyle=cw; ofc.fillRect(fx, fy, ds*fmx, ds*fmy);
				
				// 罫線と数字の描画（ここが重要）
				function drawGridAndNumbers() {
					ofc.fillStyle=cl;
					for(var i=1;i<fmx;i++) if(i%5!=0) ofc.fillRect(fx+i*ds, fy, 1, ds*fmy);
					for(var i=1;i<fmy;i++) if(i%5!=0) ofc.fillRect(fx, fy+i*ds, ds*fmx, 1);
					ofc.fillStyle=cm;
					for(var i=5;i<fmx;i+=5) ofc.fillRect(fx+i*ds, fy, 1, ds*fmy);
					for(var i=5;i<fmy;i+=5) ofc.fillRect(fx, fy+i*ds, ds*fmx, 1);
					ofc.fillStyle = cfb;
					for(var i=0;i<fmx;i++) for(var j=1;j<=tnm;j++) ofc.fillRect(fx+i*ds+1,fy-j*ds+1,ds-1,ds-1);
					for(var i=0;i<fmy;i++) for(var j=1;j<=lnm;j++) ofc.fillRect(fx-j*ds+1,fy+i*ds+1,ds-1,ds-1);
					ofc.fillStyle = cf;
					ofc.strokeRect(fx,fy,ds*fmx,ds*fmy);
					for(var i=0;i<fmx;i++) for(var j=0;j<tn[i].length;j++) ofc.fillText(tn[i][j],fx+i*ds+ds/2,fy-(tn[i].length-j-1)*ds-ds/6,ds);
					for(var i=0;i<fmy;i++) for(var j=0;j<ln[i].length;j++) ofc.fillText(ln[i][j],fx-(ln[i].length-j)*ds+ds/2,fy+(i+1)*ds-ds/6,ds);
				}
				drawGridAndNumbers();

				// 全再描画
				function fullRefresh() {
					ofc.fillStyle=cw; ofc.fillRect(fx+1, fy+1, ds*fmx-2, ds*fmy-2);
					drawGridAndNumbers();
					for(var i=0; i<fmx; i++) {
						for(var j=0; j<fmy; j++) {
							var val = map[i][j];
							if(val==1) { ofc.fillStyle=cf; ofc.fillRect(fx+i*ds+1, fy+j*ds+1, ds-1, ds-1); }
							else if(val==2) { drawX(i, j); }
						}
					}
					updateField();
				}

				function drawX(x, y) {
					ofc.beginPath(); ofc.lineWidth=0.5; ofc.strokeStyle=cf;
					ofc.moveTo(fx+x*ds+3, fy+y*ds+3); ofc.lineTo(fx+x*ds+ds-2, fy+y*ds+ds-2);
					ofc.moveTo(fx+x*ds+ds-2, fy+y*ds+3); ofc.lineTo(fx+x*ds+3, fy+y*ds+ds-2);
					ofc.stroke();
				}

				// Undo / Redo
				window.doUndo = function() {
					if(undoStack.length > 0) {
						redoStack.push(JSON.stringify(map));
						map = JSON.parse(undoStack.pop());
						fullRefresh();
					}
				};
				window.doRedo = function() {
					if(redoStack.length > 0) {
						undoStack.push(JSON.stringify(map));
						map = JSON.parse(redoStack.pop());
						fullRefresh();
					}
				};

				function updateField(){
					pcx.drawImage(of, 0, 0);
					nmk(0,0,fmx-1,fmy-1);
					if(cv) dc();
				}

				function omd(eve){
					var rect = eve.target.getBoundingClientRect();
					var myX=parseInt(eve.clientX-rect.left);
					var myY=parseInt(eve.clientY-rect.top);
					if (point(myX,myY)){
						undoStack.push(JSON.stringify(map));
						if(undoStack.length>50) undoStack.shift();
						redoStack = [];
						pm = window.currentMode;
						paint();
					}
				}

				function paint(){
					map[cpx][cpy]=pm;
					if (pm==1) ofc.fillStyle=cf; else ofc.fillStyle=cw;
					ofc.fillRect(fx+cpx*ds+1,fy+cpy*ds+1,ds-1,ds-1);
					if (pm==2) drawX(cpx, cpy);
					updateField();
				}

				// 元の補助関数（変更なし）
				function point(mouseX,mouseY){mouseX-=fx;mouseY-=fy;if (mouseX>=0 & mouseY>=0){mouseX=parseInt(mouseX/ds);mouseY=parseInt(mouseY/ds);if (mouseX<fmx && mouseY<fmy){cpx=mouseX;cpy=mouseY;return true;}}return false;}
				function dc(){pcx.fillStyle=cc;pcx.fillRect(fx+cpx*ds+1,fy-tnm*ds+1,ds-1,tnm*ds-1);pcx.fillRect(fx-lnm*ds+1,fy+cpy*ds+1,lnm*ds-1,ds-1);du(2);}
				function du(waku){if(waku){pcx.fillStyle=ccC;pcx.fillRect(fx+cpx*ds+1,fy+cpy*ds+1,ds-1,ds-1);}}
				function nmk(ptX,ptY,toX,toY){
					pcx.fillStyle=cCr;for(var ll=ptY;ll<=toY;ll++){var id=0;var cnt=0;for(var i=0;i<fmx;i++){if(map[i][ll]==1){cnt++;if(id>=ln[ll].length){id=-1;break;}}
					if((map[i][ll]!=1 || i==fmx-1) & cnt>0){if(ln[ll][id]==cnt){id++;cnt=0;}else{break;}}}if(ln[ll][0]==0 && id==0 && cnt==0)id=1;if(id==ln[ll].length && cnt==0){
					ppX[ll]=1;for(var i=1;i<=ln[ll].length;i++)pcx.fillRect(fx-i*ds+2,fy+ll*ds+2,ds-3,ds-3);}else{ppX[ll]=0;}}for(var ll=ptX;ll<=toX;ll++){var id=0;var cnt=0;
					for(var i=0;i<fmy;i++){if(map[ll][i]==1){cnt++;if(id>=tn[ll].length){id=-1;break;}}if((map[ll][i]!=1 || i==fmy-1) & cnt>0){if(tn[ll][id]==cnt){id++;cnt=0;}else{break;}
					}}if(tn[ll][0]==0 && id==0 && cnt==0)id=1;if(id==tn[ll].length && cnt==0){ppY[ll]=1;for(var i=1;i<=tn[ll].length;i++)pcx.fillRect(fx+ll*ds+2,fy-i*ds+2,
					ds-3,ds-3);}else{ppY[ll]=0;}}
				}
				
				pcs.addEventListener("mousedown",omd,false);
				updateField();
			}
			mf_7ro5sw();
		</script>
	</body>
</html>
