<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イラストロジック - 厳密判定版</title>
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; font-family: sans-serif; touch-action: pan-x pan-y; }
        #ui-panel { 
            text-align: center; padding: 10px; background: #333; 
            position: sticky; top: 0; z-index: 10000;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 8px;
        }
        #ui-panel button { 
            padding: 10px 18px; font-size: 16px; cursor: pointer; 
            border-radius: 6px; border: none; background: #eee; min-width: 70px;
        }
        #ui-panel button.active { background: #00CFFF; color: #fff; font-weight: bold; }
        .canvas-container { width: 100%; text-align: center; background: #fff; }
        canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; touch-action: none; background: #fff; }
    </style>
</head>
<body>

<div id="ui-panel">
    <button id="m1" class="active" onclick="setInMode(1)">■ 塗る</button>
    <button id="m2" onclick="setInMode(2)">× バツ</button>
    <button id="m0" onclick="setInMode(0)">□ 消す</button>
    <button onclick="execUndo()">← 戻る</button>
    <button onclick="execRedo()">進む →</button>
</div>

<div class="canvas-container">
    <h1 id="title_msg">お絵かきロジック</h1>
    <canvas id="pz_canvas" width="1632" height="1812"></canvas>
</div>

<script type="text/javascript">
    var undoStack = [], redoStack = [], currentInputMode = 1;
    var isMouseDown = false, isFinished = false;

    var ln=[[0],[2,2,2,1],[1,1,1,2],[1,1,1,4],[2,2,2,1],[0],[3,2,2,2,2,2],[5,4,4,3,3,3],[1,2,1,2,1,2,4,3,3],[2,2,2,1,2,1,2,1,2],[2,2,2,2,2,1,2,1,2],[2,4,1,1,4,1,2,4,1,2,1,2],[2,2,2,2,2,1,2,1,2],[2,2,2,7,12],[5,4,4,2,2,2],[5,4,4,2,2,2],[0],[50],[0],[3,2,2,2,2,2],[5,4,4,3,3,3],[1,2,1,2,1,2,4,3,3],[2,2,2,1,1,2,1,2,1,2],[2,2,2,2,1,2,2,2,1,2,1,2],[2,2,1,1,5,1,2,2,1,2,1,2],[2,2,2,1,2,2,1,2,1,2],[2,2,2,1,7,12],[5,4,4,2,2,2],[5,4,4,2,2,2],[0]];
    var tn=[[2,3,1,2,3],[2,4,1,2,4],[2,2,2,1,2,2,2],[6,2,1,6,2],[1,2,4,2,1,4,2],[2,1,1],[1,1],[1,2,1,1,2],[2,1,1,1,2],[1,1],[1],[2,3,1,2,3],[2,4,1,2,4],[7,2,1,7,2],[4,2,1,4,2],[1],[2,3,1,2,3],[2,4,1,2,4],[7,2,1,7,2],[1,2,4,2,1,4,2],[2,1,1,1],[1,1,1],[1,1,5],[1,1,1],[1,1,1],[1],[2,1,2],[4,1,4],[3,1,1,3,1],[2,1,1,2,1],[10,1,10],[10,1,10],[1,1,1],[1,1],[1,1,2],[1,1,2],[1,1],[1],[3,1,3],[2,1,1,2,1],[2,1,1,2,1],[10,1,10],[10,1,10],[1,1,1],[3,1,3],[2,1,1,2,1],[1,2,1,1,2,1],[2,10,1,10],[4,10,1,10],[1,1,1,1]];
    
    var fmx=50, fmy=30;
    var map = Array.from({length:fmx}, () => Array(fmy).fill(0));

    function setInMode(m) {
        currentInputMode = m;
        document.querySelectorAll('#ui-panel button').forEach(b => b.classList.remove('active'));
        document.getElementById('m' + m).classList.add('active');
    }

    function mf_start(){
        var pcs = document.getElementById('pz_canvas'), pcx = pcs.getContext('2d');
        var of = document.createElement('canvas'); of.width = pcs.width; of.height = pcs.height;
        var ofc = of.getContext('2d');
        var ds=24, fx=360, fy=216;
        var c1="#FFFFFF", cw="#FFFFFF", cl="#AAAAAA", cm="#CC2222", cf="#000000", cc="rgba(0,207,255,0.20)", ccC="#00CFFF", cs="#444444", cb1="#FFFFFF", cb2="#CCCCCC";
        var ps=326, pdx=ps+24, pdy=fy+fmy*ds+204+ps, bs=272, pbx=pcs.width-bs-24, pby=pdy;
        var cpx=0, cpy=0, sp=0, pf=0, ct=0, pc_x=0, pc_y=0;

        function getHintStatus(cells, hints) {
            var status = hints.map(() => ({ done: false }));
            var error = false;

            // 0の特殊判定
            if (hints.length === 1 && hints[0] === 0) {
                var hasBlack = cells.some(c => c === 1);
                var allFixed = cells.every(c => c !== 0);
                if (allFixed && !hasBlack) status[0].done = true;
                if (hasBlack) error = true;
                return { status, error };
            }

            // スキャン関数：端から「バツ」と「確定した黒マスの塊」を順に追う
            function scanFromEnd(cellArr, hintArr, sideStatus, isReverse) {
                var cIdx = 0;
                var hIdx = 0;

                while (cIdx < cellArr.length && hIdx < hintArr.length) {
                    if (cellArr[cIdx] === 0) break; // 空白ならそこでスキャン停止
                    
                    if (cellArr[cIdx] === 2) {
                        cIdx++; // バツは読み飛ばして次へ
                        continue;
                    }

                    if (cellArr[cIdx] === 1) {
                        var start = cIdx;
                        while (cIdx < cellArr.length && cellArr[cIdx] === 1) cIdx++;
                        var len = cIdx - start;

                        // 塊が発見された。
                        // 確定条件：長さがヒントと一致 且つ (次がバツ 又は 壁)
                        if (len === hintArr[hIdx]) {
                            if (cIdx === cellArr.length || cellArr[cIdx] === 2) {
                                var realHIdx = isReverse ? (hintArr.length - 1 - hIdx) : hIdx;
                                sideStatus[realHIdx].done = true;
                                hIdx++;
                            } else {
                                // 次が空白（0）なら、まだ伸びる可能性があるので確定させず終了
                                break;
                            }
                        } else {
                            // 発見した塊の長さが違う。
                            // もし次がバツまたは壁で「もう動かない」なら、これは明確なエラー。
                            if (cIdx === cellArr.length || cellArr[cIdx] === 2) {
                                error = true;
                            }
                            break; 
                        }
                    }
                }
            }

            // 両端からスキャン
            scanFromEnd(cells, hints, status, false);
            scanFromEnd([...cells].reverse(), [...hints].reverse(), status, true);

            // 全体矛盾チェック（塗りすぎ）
            var blackCount = cells.filter(c => c === 1).length;
            if (blackCount > hints.reduce((a,b)=>a+b, 0)) error = true;

            return { status, error };
        }

        // --- 以下は描画・操作処理（変更なし） ---
        function drawGrid() {
            ofc.fillStyle=c1; ofc.fillRect(0,0,of.width,of.height);
            ofc.fillStyle=cw; ofc.fillRect(fx,fy,fmx*ds,fmy*ds);
            ofc.font=(ds*0.75)+"px Arial"; ofc.textAlign="center";

            for(var i=0; i<fmx; i++) {
                var col = []; for(var y=0; y<fmy; y++) col.push(map[i][y]);
                var res = getHintStatus(col, tn[i]);
                for(var j=0; j<tn[i].length; j++) {
                    ofc.fillStyle = res.error ? "#FF0000" : (res.status[j].done ? "#CCCCCC" : "#000000");
                    ofc.fillText(tn[i][j], fx+i*ds+ds/2, fy-(tn[i].length-j-1)*ds-4);
                }
            }
            for(var i=0; i<fmy; i++) {
                var row = map.map(r => r[i]);
                var res = getHintStatus(row, ln[i]);
                for(var j=0; j<ln[i].length; j++) {
                    ofc.fillStyle = res.error ? "#FF0000" : (res.status[j].done ? "#CCCCCC" : "#000000");
                    ofc.fillText(ln[i][j], fx-(ln[i].length-j)*ds+ds/2, fy+(i+1)*ds-4);
                }
            }
            ofc.strokeStyle=cl;
            for(var i=0;i<=fmx;i++){ ofc.lineWidth=(i%5==0)?2:1; ofc.strokeStyle=(i%5==0)?cm:cl; ofc.beginPath(); ofc.moveTo(fx+i*ds,fy); ofc.lineTo(fx+i*ds,fy+fmy*ds); ofc.stroke(); }
            for(var j=0;j<=fmy;j++){ ofc.lineWidth=(j%5==0)?2:1; ofc.strokeStyle=(j%5==0)?cm:cl; ofc.beginPath(); ofc.moveTo(fx,fy+j*ds); ofc.lineTo(fx+fmx*ds,fy+j*ds); ofc.stroke(); }
            if(sp<2) { ofc.fillStyle="#666"; ofc.font="32px sans-serif"; ofc.fillText("タップしてコントローラーを表示", pcs.width/2, fy+fmy*ds+150); } else tud();
        }

        function tud(){
            ofc.beginPath(); var pbc = ofc.createLinearGradient(pdx, pdy-ps, pdx, pdy+ps);
            pbc.addColorStop(0, cb1); pbc.addColorStop(1, cb2); ofc.fillStyle = pbc;
            ofc.arc(pdx, pdy, ps, 0, Math.PI*2); ofc.fill(); ofc.strokeStyle = cs; ofc.lineWidth=2; ofc.stroke();
            ofc.fillStyle = cs; ofc.beginPath();
            for(var i=0; i<4; i++){
                ofc.moveTo(pdx+Math.sin(Math.PI/2*i)*ps*0.9, pdy+Math.cos(Math.PI/2*i)*ps*0.9);
                ofc.lineTo(pdx+Math.sin(Math.PI/2*i+0.3)*ps*0.6, pdy+Math.cos(Math.PI/2*i+0.3)*ps*0.6);
                ofc.lineTo(pdx+Math.sin(Math.PI/2*i-0.3)*ps*0.6, pdy+Math.cos(Math.PI/2*i-0.3)*ps*0.6);
            }
            ofc.fill(); ofc.beginPath(); ofc.arc(pbx, pby, bs, 0, Math.PI*2); ofc.fill(); ofc.stroke();
            ofc.fillStyle = cs; ofc.font = "bold 60px Arial"; ofc.textAlign="center"; ofc.fillText("決定", pbx, pby + 20);
        }

        function refresh() {
            if(isFinished) return;
            drawGrid();
            for(var x=0;x<fmx;x++) for(var y=0;y<fmy;y++) {
                if(map[x][y]==1){ ofc.fillStyle=cf; ofc.fillRect(fx+x*ds+1,fy+y*ds+1,ds-1,ds-1); }
                else if(map[x][y]==2){
                    ofc.beginPath(); ofc.strokeStyle=cf; ofc.lineWidth=1;
                    ofc.moveTo(fx+x*ds+4,fy+y*ds+4); ofc.lineTo(fx+x*ds+ds-4,fy+y*ds+ds-4);
                    ofc.moveTo(fx+x*ds+ds-4,fy+y*ds+4); ofc.lineTo(fx+x*ds+4,fy+y*ds+ds-4); ofc.stroke();
                }
            }
            update();
            checkAllClear();
        }

        function checkAllClear() {
            for(var i=0; i<fmx; i++) {
                var col=[]; for(var y=0;y<fmy;y++) col.push(map[i][y]);
                var s=[]; var c=0; for(var v of col){if(v==1)c++; else if(c>0){s.push(c);c=0;}} if(c>0)s.push(c); if(s.length==0)s=[0];
                if(s.join(',')!==tn[i].join(',')) return;
            }
            for(var i=0; i<fmy; i++) {
                var row=map.map(r=>r[i]);
                var s=[]; var c=0; for(var v of row){if(v==1)c++; else if(c>0){s.push(c);c=0;}} if(c>0)s.push(c); if(s.length==0)s=[0];
                if(s.join(',')!==ln[i].join(',')) return;
            }
            isFinished=true; document.getElementById('title_msg').innerText="正解です！おめでとう！";
            ofc.fillStyle=c1; ofc.fillRect(0,0,of.width,of.height);
            var zx=(of.width-fmx*ds)/2, zy=(of.height-fmy*ds)/2;
            for(var x=0;x<fmx;x++) for(var y=0;y<fmy;y++) if(map[x][y]==1){ ofc.fillStyle=cf; ofc.fillRect(zx+x*ds,zy+y*ds,ds,ds); }
            update();
        }

        function update() { pcx.drawImage(of,0,0); if(!isFinished){ pcx.fillStyle=cc; pcx.fillRect(fx+cpx*ds,fy,ds,fmy*ds); pcx.fillRect(fx,fy+cpy*ds,fmx*ds,ds); pcx.strokeStyle=ccC; pcx.lineWidth=2; pcx.strokeRect(fx+cpx*ds,fy+cpy*ds,ds,ds); } }
        function moveCursor(dx, dy) { if(isFinished) return; cpx+=dx; cpy+=dy; cpx=Math.max(0,Math.min(fmx-1,cpx)); cpy=Math.max(0,Math.min(fmy-1,cpy)); if(pf&16) paintCell(); refresh(); }
        function paintCell() { if(map[cpx][cpy] == currentInputMode) return; map[cpx][cpy] = currentInputMode; refresh(); }
        setInterval(function(){ if(ct > 0) { ct++; if(ct > 8 && ct % 2 == 0 && (pc_x !== 0 || pc_y !== 0)) moveCursor(pc_x, pc_y); } }, 60);

        window.execUndo = function() { if(undoStack.length>0){ redoStack.push(JSON.stringify(map)); map=JSON.parse(undoStack.pop()); refresh(); } };
        window.execRedo = function() { if(undoStack.length>0){ undoStack.push(JSON.stringify(map)); map=JSON.parse(redoStack.pop()); refresh(); } };
        function save() { undoStack.push(JSON.stringify(map)); if(undoStack.length>50)undoStack.shift(); redoStack=[]; }
        function getPos(ex, ey) { var rect = pcs.getBoundingClientRect(); return { x: (ex-rect.left)*(pcs.width/rect.width), y: (ey-rect.top)*(pcs.height/rect.height) }; }

        pcs.addEventListener("touchstart", function(e) {
            if(isFinished) return;
            var isCont=false, hB=false, hJ=false;
            for(var i=0; i<e.touches.length; i++){
                var p=getPos(e.touches[i].clientX, e.touches[i].clientY);
                if(sp<2 && p.y>fy+fmy*ds){ sp=2; refresh(); return; }
                if(sp>=2 && p.y>fy+fmy*ds){
                    isCont=true; var lP=Math.sqrt(Math.pow(p.x-pdx,2)+Math.pow(p.y-pdy,2)); var lB=Math.sqrt(Math.pow(p.x-pbx,2)+Math.pow(p.y-pby,2));
                    if(lP<ps*1.2){ var tan=Math.atan2(p.y-pdy, p.x-pdx); pc_x=0; pc_y=0; if(Math.abs(tan)<Math.PI/4) pc_x=1; else if(Math.abs(tan)>Math.PI*0.75) pc_x=-1; else if(tan>0) pc_y=1; else pc_y=-1; hJ=true; } else if(lB<bs*1.2) hB=true;
                }
            }
            if(isCont){ if(hB && !(pf&16)){ save(); pf|=16; paintCell(); } if(!hB) pf&=~16; if(hJ && ct===0){ save(); ct=1; moveCursor(pc_x,pc_y); } if(!hJ){ ct=0; pc_x=0; pc_y=0; } e.preventDefault(); }
            else { var p=getPos(e.touches[0].clientX, e.touches[0].clientY); if(p.x>=fx && p.x<fx+fmx*ds && p.y>=fy && p.y<fy+fmy*ds){ save(); cpx=Math.floor((p.x-fx)/ds); cpy=Math.floor((p.y-fy)/ds); map[cpx][cpy]=currentInputMode; refresh(); } }
        }, {passive:false});

        pcs.addEventListener("touchmove", function(e) {
            if(isFinished) return;
            var onP=false, hB=false, hJ=false;
            for(var i=0; i<e.touches.length; i++){
                var p=getPos(e.touches[i].clientX, e.touches[i].clientY);
                if(sp>=2 && p.y>fy+fmy*ds){ onP=true; var lP=Math.sqrt(Math.pow(p.x-pdx,2)+Math.pow(p.y-pdy,2)); var lB=Math.sqrt(Math.pow(p.x-pbx,2)+Math.pow(p.y-pby,2));
                    if(lP<ps*1.2){ var tan=Math.atan2(p.y-pdy, p.x-pdx); pc_x=0; pc_y=0; if(Math.abs(tan)<Math.PI/4) pc_x=1; else if(Math.abs(tan)>Math.PI*0.75) pc_x=-1; else if(tan>0) pc_y=1; else pc_y=-1; hJ=true; } else if(lB<bs*1.2) hB=true;
                }
            }
            if(onP){ if(hB && !(pf&16)){ save(); pf|=16; paintCell(); } if(!hB) pf&=~16; if(hJ && ct===0){ save(); ct=1; moveCursor(pc_x,pc_y); } if(!hJ){ ct=0; pc_x=0; pc_y=0; } e.preventDefault(); }
            else if(e.touches.length===1){ var p=getPos(e.touches[0].clientX, e.touches[0].clientY); var tx=Math.floor((p.x-fx)/ds), ty=Math.floor((p.y-fy)/ds); if(tx>=0 && tx<fmx && ty>=0 && ty<fmy && (cpx!=tx || cpy!=ty)){ cpx=tx; cpy=ty; map[tx][ty]=currentInputMode; refresh(); } }
        }, {passive:false});

        pcs.addEventListener("touchend", function(e) { if(e.touches.length===0){ ct=0; pf&=~16; pc_x=0; pc_y=0; } });
        pcs.addEventListener("mousedown", function(e) { if(isFinished) return; var p=getPos(e.clientX, e.clientY); if(p.y<fy+fmy*ds){ isMouseDown=true; save(); cpx=Math.floor((p.x-fx)/ds); cpy=Math.floor((p.y-fy)/ds); map[cpx][cpy]=currentInputMode; refresh(); } });
        window.addEventListener("mousemove", function(e) { if(!isMouseDown || isFinished) return; var p=getPos(e.clientX, e.clientY); var tx=Math.floor((p.x-fx)/ds), ty=Math.floor((p.y-fy)/ds); if(tx>=0 && tx<fmx && ty>=0 && ty<fmy && (cpx!=tx || cpy!=ty)){ cpx=tx; cpy=ty; map[tx][ty]=currentInputMode; refresh(); } });
        window.addEventListener("mouseup", function() { isMouseDown=false; });

        refresh();
    }
    window.onload = mf_start;
</script>
</body>
</html>
