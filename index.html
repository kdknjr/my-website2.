<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イラストロジック - PC・スマホ完全対応版</title>
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; font-family: sans-serif; touch-action: pan-x pan-y; }
        #ui-panel { 
            text-align: center; padding: 10px; background: #333; 
            position: sticky; top: 0; z-index: 10000;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 8px;
        }
        #ui-panel button { 
            padding: 10px 20px; font-size: 16px; cursor: pointer; 
            border-radius: 6px; border: none; background: #eee; min-width: 80px;
        }
        #ui-panel button.active { background: #00CFFF; color: #fff; font-weight: bold; }
        .canvas-container { width: 100%; text-align: center; background: #fff; padding-bottom: 50px; }
        canvas { 
            max-width: 100%; height: auto; display: block; margin: 0 auto;
            touch-action: none; background: #fff; cursor: crosshair;
        }
        h1 { font-size: 20px; margin: 15px 0; color: #333; }
    </style>
</head>
<body>

<div id="ui-panel">
    <button id="m1" class="active" onclick="setInMode(1)">■ 塗る</button>
    <button id="m2" onclick="setInMode(2)">× バツ</button>
    <button id="m0" onclick="setInMode(0)">□ 消す</button>
    <button onclick="execUndo()">← 戻る</button>
    <button onclick="execRedo()">進む →</button>
</div>

<div class="canvas-container">
    <h1>計算してみると......</h1>
    <canvas id="pz_canvas" width="1632" height="1812"></canvas>
    <p style="color:#888;"><small>PC：マウスドラッグで連続塗り / スマホ：コントローラー対応</small></p>
</div>

<script type="text/javascript">
    var undoStack = [];
    var redoStack = [];
    var currentInputMode = 1;
    var isMouseDown = false;

    function setInMode(m) {
        currentInputMode = m;
        document.querySelectorAll('#ui-panel button').forEach(b => b.classList.remove('active'));
        document.getElementById('m' + m).classList.add('active');
    }

    function mf_start(){
        var pcs = document.getElementById('pz_canvas');
        var pcx = pcs.getContext('2d');
        var of = document.createElement('canvas');
        of.width = pcs.width; of.height = pcs.height;
        var ofc = of.getContext('2d');

        var ds=24, fmx=50, fmy=30, fx=360, fy=216;
        var c1="#FFFFFF", cw="#FFFFFF", cl="#AAAAAA", cm="#CC2222", cf="#000000", cc="rgba(0,207,255,0.20)", ccC="#00CFFF", cs="#444444", cb1="#FFFFFF", cb2="#CCCCCC";
        var ps=326, pdx=ps+24, pdy=fy+fmy*ds+204+ps, bs=272, pbx=pcs.width-bs-24, pby=pdy;
        
        var ln=[[0],[2,2,2,1],[1,1,1,2],[1,1,1,4],[2,2,2,1],[0],[3,2,2,2,2,2],[5,4,4,3,3,3],[1,2,1,2,1,2,4,3,3],[2,2,2,1,2,1,2,1,2],[2,2,2,2,2,1,2,1,2],[2,4,1,1,4,1,2,4,1,2,1,2],[2,2,2,2,2,1,2,1,2],[2,2,2,7,12],[5,4,4,2,2,2],[5,4,4,2,2,2],[0],[50],[0],[3,2,2,2,2,2],[5,4,4,3,3,3],[1,2,1,2,1,2,4,3,3],[2,2,2,1,1,2,1,2,1,2],[2,2,2,2,1,2,2,2,1,2,1,2],[2,2,1,1,5,1,2,2,1,2,1,2],[2,2,2,1,2,2,1,2,1,2],[2,2,2,1,7,12],[5,4,4,2,2,2],[5,4,4,2,2,2],[0]];
        var tn=[[2,3,1,2,3],[2,4,1,2,4],[2,2,2,1,2,2,2],[6,2,1,6,2],[1,2,4,2,1,4,2],[2,1,1],[1,1],[1,2,1,1,2],[2,1,1,1,2],[1,1],[1],[2,3,1,2,3],[2,4,1,2,4],[7,2,1,7,2],[4,2,1,4,2],[1],[2,3,1,2,3],[2,4,1,2,4],[7,2,1,7,2],[1,2,4,2,1,4,2],[2,1,1,1],[1,1,1],[1,1,5],[1,1,1],[1,1,1],[1],[2,1,2],[4,1,4],[3,1,1,3,1],[2,1,1,2,1],[10,1,10],[10,1,10],[1,1,1],[1,1],[1,1,2],[1,1,2],[1,1],[1],[3,1,3],[2,1,1,2,1],[2,1,1,2,1],[10,1,10],[10,1,10],[1,1,1],[3,1,3],[2,1,1,2,1],[1,2,1,1,2,1],[2,10,1,10],[4,10,1,10],[1,1,1,1]];
        var map = Array.from({length:fmx}, () => Array(fmy).fill(0));
        var cpx=0, cpy=0, sp=0, pf=0, ct=0, pc_x=0, pc_y=0;

        function tud(){
            ofc.beginPath(); var pbc = ofc.createLinearGradient(pdx, pdy-ps, pdx, pdy+ps);
            pbc.addColorStop(0, cb1); pbc.addColorStop(1, cb2); ofc.fillStyle = pbc;
            ofc.arc(pdx, pdy, ps, 0, Math.PI*2); ofc.fill(); ofc.strokeStyle = cs; ofc.lineWidth=2; ofc.stroke();
            ofc.fillStyle = cs; ofc.beginPath();
            for(var i=0; i<4; i++){
                ofc.moveTo(pdx+Math.sin(Math.PI/2*i)*ps*0.9, pdy+Math.cos(Math.PI/2*i)*ps*0.9);
                ofc.lineTo(pdx+Math.sin(Math.PI/2*i+0.3)*ps*0.6, pdy+Math.cos(Math.PI/2*i+0.3)*ps*0.6);
                ofc.lineTo(pdx+Math.sin(Math.PI/2*i-0.3)*ps*0.6, pdy+Math.cos(Math.PI/2*i-0.3)*ps*0.6);
            }
            ofc.fill();
            ofc.beginPath(); ofc.arc(pbx, pby, bs, 0, Math.PI*2); ofc.fill(); ofc.stroke();
            ofc.fillStyle = cs; ofc.font = "bold 60px Arial"; ofc.textAlign="center"; ofc.fillText("決定", pbx, pby + 20);
        }

        function drawGrid() {
            ofc.fillStyle=c1; ofc.fillRect(0,0,of.width,of.height);
            ofc.fillStyle=cw; ofc.fillRect(fx,fy,fmx*ds,fmy*ds);
            ofc.font=(ds*0.75)+"px Arial"; ofc.textAlign="center"; ofc.fillStyle=cf;
            for(var i=0;i<fmx;i++) for(var j=0;j<tn[i].length;j++) ofc.fillText(tn[i][j],fx+i*ds+ds/2,fy-(tn[i].length-j-1)*ds-4);
            for(var i=0;i<fmy;i++) for(var j=0;j<ln[i].length;j++) ofc.fillText(ln[i][j],fx-(ln[i].length-j)*ds+ds/2,fy+(i+1)*ds-4);
            ofc.strokeStyle=cl;
            for(var i=0;i<=fmx;i++){ ofc.lineWidth=(i%5==0)?2:1; ofc.strokeStyle=(i%5==0)?cm:cl; ofc.beginPath(); ofc.moveTo(fx+i*ds,fy); ofc.lineTo(fx+i*ds,fy+fmy*ds); ofc.stroke(); }
            for(var j=0;j<=fmy;j++){ ofc.lineWidth=(j%5==0)?2:1; ofc.strokeStyle=(j%5==0)?cm:cl; ofc.beginPath(); ofc.moveTo(fx,fy+j*ds); ofc.lineTo(fx+fmx*ds,fy+j*ds); ofc.stroke(); }
            if(sp>=2) tud(); else { ofc.fillStyle="#666"; ofc.font="36px sans-serif"; ofc.fillText("ここをタップしてコントローラーを表示", pcs.width/2, fy+fmy*ds+150); }
        }

        function refresh() {
            drawGrid();
            for(var x=0;x<fmx;x++) for(var y=0;y<fmy;y++) {
                if(map[x][y]==1){ ofc.fillStyle=cf; ofc.fillRect(fx+x*ds+1,fy+y*ds+1,ds-1,ds-1); }
                else if(map[x][y]==2){
                    ofc.beginPath(); ofc.strokeStyle=cf; ofc.lineWidth=1;
                    ofc.moveTo(fx+x*ds+4,fy+y*ds+4); ofc.lineTo(fx+x*ds+ds-4,fy+y*ds+ds-4);
                    ofc.moveTo(fx+x*ds+ds-4,fy+y*ds+4); ofc.lineTo(fx+x*ds+4,fy+y*ds+ds-4); ofc.stroke();
                }
            }
            update();
        }

        function update() {
            pcx.drawImage(of,0,0);
            pcx.fillStyle=cc; pcx.fillRect(fx+cpx*ds,fy,ds,fmy*ds); pcx.fillRect(fx,fy+cpy*ds,fmx*ds,ds);
            pcx.strokeStyle=ccC; pcx.lineWidth=2; pcx.strokeRect(fx+cpx*ds,fy+cpy*ds,ds,ds);
        }

        function moveCursor(dx, dy) {
            cpx += dx; cpy += dy;
            if(cpx<0)cpx=0; if(cpx>=fmx)cpx=fmx-1; if(cpy<0)cpy=0; if(cpy>=fmy)cpy=fmy-1;
            if(pf & 16) paintCell();
            refresh();
        }

        function paintCell() {
            if(map[cpx][cpy] == currentInputMode) return;
            map[cpx][cpy] = currentInputMode; refresh();
        }

        setInterval(function(){ if(ct>0) { ct++; if(ct>8 && ct%2==0 && (pc_x!==0 || pc_y!==0)) moveCursor(pc_x,pc_y); } }, 60);

        window.execUndo = function() { if(undoStack.length>0){ redoStack.push(JSON.stringify(map)); map=JSON.parse(undoStack.pop()); refresh(); } };
        window.execRedo = function() { if(redoStack.length>0){ undoStack.push(JSON.stringify(map)); map=JSON.parse(redoStack.pop()); refresh(); } };
        function save() { undoStack.push(JSON.stringify(map)); if(undoStack.length>50)undoStack.shift(); redoStack=[]; }

        // 統合入力処理
        function processInput(x, y, isStart, isMove, isEnd) {
            var rect = pcs.getBoundingClientRect();
            var mx = (x - rect.left) * (pcs.width / rect.width);
            var my = (y - rect.top) * (pcs.height / rect.height);

            if(isStart && my > fy + fmy*ds && sp < 2) { sp=2; refresh(); return; }

            if(sp >= 2 && my > fy + fmy*ds) {
                // コントローラーエリア
                var lenP = Math.sqrt(Math.pow(mx-pdx,2)+Math.pow(my-pdy,2));
                var lenB = Math.sqrt(Math.pow(mx-pbx,2)+Math.pow(my-pby,2));
                if(isStart || isMove) {
                    if(lenP < ps*1.2) {
                        var tan = Math.atan2(my-pdy, mx-pdx);
                        pc_x=0; pc_y=0;
                        if(Math.abs(tan)<Math.PI/4) pc_x=1; else if(Math.abs(tan)>Math.PI*0.75) pc_x=-1; else if(tan>0) pc_y=1; else pc_y=-1;
                        if(ct==0) { save(); ct=1; moveCursor(pc_x, pc_y); }
                    } else if(lenB < bs*1.2) {
                        if(!(pf & 16)) { save(); pf |= 16; paintCell(); }
                    }
                }
            } else {
                // 盤面エリア
                var tx = Math.floor((mx-fx)/ds), ty = Math.floor((my-fy)/ds);
                if(tx>=0 && tx<fmx && ty>=0 && ty<fmy) {
                    if(isStart) { save(); cpx=tx; cpy=ty; map[tx][ty]=currentInputMode; refresh(); }
                    else if(isMove && (cpx!=tx || cpy!=ty)) { cpx=tx; cpy=ty; map[tx][ty]=currentInputMode; refresh(); }
                }
            }
            if(isEnd) { ct=0; pf &= ~16; pc_x=0; pc_y=0; }
        }

        // マウスイベント
        pcs.addEventListener("mousedown", (e) => { isMouseDown=true; processInput(e.clientX, e.clientY, true, false, false); });
        window.addEventListener("mousemove", (e) => { if(isMouseDown) processInput(e.clientX, e.clientY, false, true, false); });
        window.addEventListener("mouseup", () => { isMouseDown=false; processInput(0,0,false,false,true); });

        // タッチイベント
        pcs.addEventListener("touchstart", (e) => { processInput(e.touches[0].clientX, e.touches[0].clientY, true, false, false); e.preventDefault(); }, {passive:false});
        pcs.addEventListener("touchmove", (e) => { processInput(e.touches[0].clientX, e.touches[0].clientY, false, true, false); e.preventDefault(); }, {passive:false});
        pcs.addEventListener("touchend", (e) => { processInput(0,0,false,false,true); e.preventDefault(); }, {passive:false});

        refresh();
    }
    window.onload = mf_start;
</script>
</body>
</html>
